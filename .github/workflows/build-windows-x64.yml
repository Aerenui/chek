name: Build Windows x64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        run: sudo apt-get install -y mingw-w64

      - name: Configure
        run: |
          mkdir cmake-windows-build
          cd cmake-windows-build
          cmake -DCMAKE_TOOLCHAIN_FILE=../cross-windows.cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: cmake --build cmake-windows-build --target main -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-windows-x64
          path: bin/main.exe
